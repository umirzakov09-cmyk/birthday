<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для Дильназ ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3, #fad0c4);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* 💌 БОЛЬШОЙ КОНВЕРТ */
.envelope {
    width: 320px;
    height: 220px;
    position: relative;
    cursor: pointer;
    perspective: 1000px;
}

/* основа */
.base {
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #ff4d6d, #ff1e4d);
    border-radius: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    position: absolute;
}

/* крышка */
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #ff1e4d, #ff4d6d);
    clip-path: polygon(0 0, 50% 65%, 100% 0);
    transform-origin: top;
    transition: transform 0.8s ease;
    border-radius: 15px;
}

/* письмо */
.letter {
    position: absolute;
    width: 85%;
    height: 80%;
    background: white;
    top: 10%;
    left: 7.5%;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    font-weight: bold;
    color: #ff4d6d;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
    transition: transform 0.6s ease;
}

/* при открытии */
.envelope.open .flap {
    transform: rotateX(180deg);
}

.envelope.open .letter {
    transform: translateY(-40px);
}

/* ✨ основной контент */
.container {
    display: none;
    text-align: center;
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 400px;
}

img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid #ff4d6d;
    transition: 0.8s;
}

.fade {
    opacity: 0;
    transform: scale(0.8);
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

/* ❤️ сердечки */
.heart {
    position: fixed;
    top: -10px;
    color: red;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- 💌 КОНВЕРТ -->
<div class="envelope" id="env" onclick="openEnvelope()">
    <div class="base"></div>
    <div class="flap"></div>
    <div class="letter">Открой меня 💌</div>
</div>

<!-- 🎉 ОСНОВНОЙ КОНТЕНТ -->
<div class="container" id="mainContent">
    <h2>С Днём Рождения, Дильназ! 🎉❤️</h2>

    <img id="photo" src="WhatsApp Image 2026-04-15 at 21.43.13.jpeg">

    <p id="message">Нажми ниже 💖</p>
    <button onclick="startLove()">Открыть поздравление</button>
</div>

<audio id="music" src="song.mp3"></audio>

<script>
function openEnvelope() {
    const env = document.getElementById("env");
    env.classList.add("open");

    setTimeout(() => {
        env.style.display = "none";
        document.getElementById("mainContent").style.display = "block";
    }, 900);
}

function startLove() {
    document.getElementById("message").innerHTML =
    "Дильназ, ты самая красивая девушка,каждый момент с тобой - это волшебство,ты не такая как все 💖 Ты особенная и невероятная 🌸";

    document.getElementById("music").play();

    changeImage();
    setInterval(createHeart, 200);
}

function changeImage() {
    const img = document.getElementById("photo");

    img.classList.add("fade");

    setTimeout(() => {
        img.src = "https://media.tenor.com/GotFYOaJGzcAAAAi/niat-niat-devecioglu.gif";
        img.classList.remove("fade");
    }, 400);
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}
</script>

</body>
</html>
